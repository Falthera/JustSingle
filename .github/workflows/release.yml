name: Build Tag Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create and publish (example: v1.0.0)"
        required: false
        type: string
      prerelease:
        description: "Mark this release as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-tag-release:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Resolve release metadata and version
        id: meta
        shell: bash
        run: |
          MOD_VERSION="$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)"

          if [ "${{ github.event_name }}" = "push" ]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$MOD_VERSION"
            NEXT_PATCH=$((PATCH + 1))
            NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"

            sed -i "s/^mod_version=.*/mod_version=${NEXT_VERSION}/" gradle.properties

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add gradle.properties
            git commit -m "ci: bump mod_version to ${NEXT_VERSION} [skip ci]"
            git push

            TAG="v${NEXT_VERSION}"
            PRERELEASE="false"
            RELEASE_NAME="JustSingle ${TAG}"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
            RELEASE_NAME="JustSingle ${TAG}"

            if [ "${{ inputs.prerelease }}" = "true" ]; then
              PRERELEASE="true"
            else
              PRERELEASE="false"
            fi
          else
            TAG="v${MOD_VERSION}"
            PRERELEASE="false"
            RELEASE_NAME="JustSingle ${TAG}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build mod
        run: gradle clean build --no-daemon

      - name: Create and push tag if missing
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | grep -q "${RELEASE_TAG}"; then
            echo "Tag ${RELEASE_TAG} already exists on origin"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub release and upload jars
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: |
            build/libs/*.jar
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
