name: Build Tag Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create and publish (example: v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark this release as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-tag-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build mod
        run: gradle clean build --no-daemon

      - name: Create and push tag if missing
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | grep -q "${RELEASE_TAG}"; then
            echo "Tag ${RELEASE_TAG} already exists on origin"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub release and upload jars
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          files: |
            build/libs/*.jar
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
